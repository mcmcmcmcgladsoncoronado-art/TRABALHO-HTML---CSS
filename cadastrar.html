<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulario visual para cadastrar um livro no Clube da Livraria.">
    <link rel="stylesheet" href="style.css">
    <title>Cadastrar Livro - Clube da Livraria</title>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html#inicio">Inicio</a></li>
                <li><a href="index.html#livros">Livros</a></li>
                <li><a href="cadastrar.html">Cadastrar Livro</a></li>
                <li><a href="index.html#sobre">Sobre</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="register-book">
            <div class="section-title">
                <h1>Cadastrar Livro</h1>
                <p>Preencha as informacoes para adicionar um novo livro ao clube.</p>
            </div>

            <form>
                <div class="form-group">
                    <label for="titulo">Titulo do livro</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Ex: Memorias Postumas de Bras Cubas">
                </div>

                <div class="form-group">
                    <label for="autor">Autor</label>
                    <input type="text" id="autor" name="autor" placeholder="Ex: Machado de Assis">
                </div>

                <div class="form-group">
                    <label for="genero">Genero</label>
                    <select id="genero" name="genero">
                        <option>Romance</option>
                        <option>Fantasia</option>
                        <option>Drama</option>
                        <option>Ficcao cientifica</option>
                        <option>Literatura brasileira</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ano">Ano de publicacao</label>
                    <input type="number" id="ano" name="ano" placeholder="Ex: 1899">
                </div>

                <div class="form-group form-group-full">
                    <label for="capa">Link da capa</label>
                    <input type="url" id="capa" name="capa" placeholder="https://exemplo.com/capa-do-livro.jpg">
                </div>

                <div class="form-group form-group-full">
                    <label for="descricao">Descricao</label>
                    <textarea id="descricao" name="descricao" rows="5" placeholder="Escreva uma pequena descricao do livro"></textarea>
                </div>

                <button type="submit">Cadastrar Livro</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Clube da Livraria - Catalogo de Livros</p>
    </footer>
</body>
</html>
